name: Keep Render App Alive

on:
  schedule:
    # Executa a cada 14 minutos (Render free tier dorme após 15 minutos de inatividade)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub Actions se necessário

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping URL do Render
        run: |
          # Substitua a URL abaixo pela URL real do seu app no Render
          curl -I https://verbetograma.onrender.com
