name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit app
        run: |
          curl -I --max-time 60 --max-redirs 5 \
          --user-agent "Mozilla/5.0" \
          https://verbetograma.streamlit.app/ || true
